<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NoiseZero AI - Denoise Audio & Video</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            color: #2c3e50;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 600px;
            margin-bottom: 2rem;
        }
        h2 {
            border-bottom: 2px solid #e0e0e0;
            padding-bottom: 0.5rem;
            margin-top: 0;
        }
        form {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }
        .form-group {
            display: flex;
            flex-direction: column;
        }
        label {
            margin-bottom: 0.5rem;
            font-weight: 600;
        }
        input[type="file"] {
            border: 1px solid #ccc;
            padding: 0.5rem;
            border-radius: 4px;
        }
        input[type="range"] {
            width: 100%;
        }
        button {
            padding: 0.75rem;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #2980b9;
        }
        .loader {
            display: none;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 1rem auto 0;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .message {
            margin-top: 1rem;
            padding: 1rem;
            border-radius: 4px;
            display: none;
        }
        .message.error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>
<body>

    <h1>NoiseZero AI</h1>

    <!-- Audio Denoising Form -->
    <div class="container">
        <h2>Denoise Audio File</h2>
        <form id="audio-form" action="/denoise/denoise-audio" method="post" enctype="multipart/form-data">
            <div class="form-group">
                <label for="audio-file">Audio File (WAV, MP3, etc.)</label>
                <input type="file" id="audio-file" name="file" accept="audio/*" required>
            </div>
            <div class="form-group">
                <label for="audio-intensity">Denoising Intensity: <span id="audio-intensity-value">1.0</span></label>
                <input type="range" id="audio-intensity" name="intensity_ratio" min="0.0" max="1.0" step="0.1" value="1.0" oninput="document.getElementById('audio-intensity-value').textContent = this.value">
            </div>
            <button type="submit">Denoise Audio</button>
        </form>
        <div class="loader" id="audio-loader"></div>
        <div class="message error" id="audio-error"></div>
    </div>

    <!-- Video Denoising Form -->
    <div class="container">
        <h2>Denoise Video File</h2>
        <form id="video-form" action="/denoise/denoise-video" method="post" enctype="multipart/form-data">
            <div class="form-group">
                <label for="video-file">Video File (MP4, MOV, etc.)</label>
                <input type="file" id="video-file" name="file" accept="video/*" required>
            </div>
            <div class="form-group">
                <label for="video-intensity">Denoising Intensity: <span id="video-intensity-value">1.0</span></label>
                <input type="range" id="video-intensity" name="intensity_ratio" min="0.0" max="1.0" step="0.1" value="1.0" oninput="document.getElementById('video-intensity-value').textContent = this.value">
            </div>
            <button type="submit">Denoise Video</button>
        </form>
        <div class="loader" id="video-loader"></div>
        <div class="message error" id="video-error"></div>
    </div>

    <script>
        function handleFormSubmit(formId, loaderId, errorId) {
            const form = document.getElementById(formId);
            form.addEventListener('submit', async function(event) {
                event.preventDefault();
                const loader = document.getElementById(loaderId);
                const errorDiv = document.getElementById(errorId);
                const submitButton = form.querySelector('button');

                loader.style.display = 'block';
                errorDiv.style.display = 'none';
                submitButton.disabled = true;

                try {
                    const formData = new FormData(form);
                    const response = await fetch(form.action, {
                        method: 'POST',
                        body: formData,
                    });

                    if (!response.ok) {
                        const errorData = await response.json();
                        throw new Error(errorData.detail || `HTTP error! status: ${response.status}`);
                    }

                    const blob = await response.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.style.display = 'none';
                    a.href = url;
                    const contentDisposition = response.headers.get('content-disposition');
                    let filename = 'denoised_output';
                    if (contentDisposition) {
                        const filenameMatch = contentDisposition.match(/filename="(.+)"/);
                        if (filenameMatch.length > 1) {
                            filename = filenameMatch[1];
                        }
                    }
                    a.download = filename;
                    document.body.appendChild(a);
                    a.click();
                    window.URL.revokeObjectURL(url);
                    a.remove();

                } catch (error) {
                    errorDiv.textContent = 'An error occurred: ' + error.message;
                    errorDiv.style.display = 'block';
                } finally {
                    loader.style.display = 'none';
                    submitButton.disabled = false;
                }
            });
        }

        handleFormSubmit('audio-form', 'audio-loader', 'audio-error');
        handleFormSubmit('video-form', 'video-loader', 'video-error');
    </script>

</body>
</html>
